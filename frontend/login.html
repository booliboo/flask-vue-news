<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 新闻网通行证</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #c00; }
        body { background: #f0f2f5; font-family: "Helvetica Neue",sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 360px; }
        .logo { text-align: center; color: var(--primary); font-size: 30px; font-weight: 900; margin-bottom: 30px; letter-spacing: 2px; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 13px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn:hover { background: #a00; }
        .switch { text-align: center; margin-top: 20px; font-size: 14px; color: #666; cursor: pointer; }
        .social-login { display: flex; justify-content: center; gap: 25px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .social-login i { font-size: 24px; color: #aaa; cursor: pointer; transition: 0.3s; }
        .social-login i:hover { color: var(--primary); }
    </style>
</head>
<body>
<div id="app">
    <div class="login-card">
        <div class="logo">新闻网 · {{ isLogin ? '登录' : '注册' }}</div>
        <div class="input-group">
            <input v-model="form.username" placeholder="请输入用户名" @keyup.enter="handleSubmit">
        </div>
        <div class="input-group">
            <input v-model="form.password" type="password" placeholder="请输入密码" @keyup.enter="handleSubmit">
        </div>
        <button class="btn" @click="handleSubmit">{{ isLogin ? '立即进入' : '注册账号' }}</button>
        <div class="switch" @click="isLogin = !isLogin">
            {{ isLogin ? '还没有账号？点击注册' : '已有账号？返回登录' }}
        </div>
        <div class="social-login">
            <i class="fab fa-weixin"></i>
            <i class="fab fa-qq"></i>
            <i class="fab fa-weibo"></i>
        </div>
    </div>
</div>
<script>
    const { createApp, ref } = Vue;
    const API_BASE = "http://127.0.0.1:5000/api";
    
    createApp({
        setup() {
            const isLogin = ref(true);
            const form = ref({ username: '', password: '' });

            const handleSubmit = async () => {
                if(!form.value.username || !form.value.password) return alert("请填写完整");
                
                try {
                    const url = isLogin.value ? `${API_BASE}/login` : `${API_BASE}/register`;
                    const res = await axios.post(url, form.value);

                    if (isLogin.value) {
                        // 1. 存储登录凭证和用户信息
                        localStorage.setItem('token', res.data.token);
                        localStorage.setItem('username', res.data.username);
                        localStorage.setItem('role', res.data.role); 
                        localStorage.setItem('nickname', res.data.nickname || res.data.username);

                        // 2. 跳转到首页
                        window.location.href = 'home.html';
                    } else {
                        alert("注册成功，请登录");
                        isLogin.value = true;
                        form.value.password = ''; 
                    }
                } catch (e) {
                    alert(e.response?.data?.msg || "账号或密码错误");
                }
            };

            // 返回给 Vue 模板使用的变量
            return { 
                isLogin, 
                form, 
                handleSubmit 
            }; 
        }
    }).mount('#app');
</script>
</body>
</html>
